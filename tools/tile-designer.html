<!DOCTYPE html>
<html>
<head>
<title>Oil Empire — Tile & Biome Designer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; padding: 20px; display: flex; gap: 20px; min-height: 100vh; }
.panel { background: #16213e; border-radius: 12px; padding: 16px; border: 1px solid #333; overflow-y: auto; max-height: 95vh; }
#left-panel { width: 320px; }
#center-panel { flex: 1; }
#right-panel { width: 360px; }
h2 { color: #ffd700; margin-bottom: 12px; font-size: 18px; }
h3 { color: #aab; margin: 10px 0 6px; font-size: 14px; }
.biome-card { display: flex; align-items: center; gap: 10px; padding: 10px; margin: 6px 0; border-radius: 8px; cursor: pointer; border: 2px solid #333; transition: all 0.15s; }
.biome-card:hover { border-color: #ffd700; }
.biome-card.active { border-color: #e94560; background: #2a1525; }
.biome-card .emoji { font-size: 24px; }
.biome-card .info { flex: 1; }
.biome-card .info .name { font-weight: bold; font-size: 14px; }
.biome-card .info .stats { font-size: 11px; color: #889; }
.biome-card .preview-strip { display: flex; gap: 1px; }
.biome-card .preview-strip div { width: 8px; height: 20px; border-radius: 2px; }
.palette-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; margin: 3px 0; border-radius: 6px; cursor: pointer; border: 2px solid transparent; transition: all 0.12s; font-size: 12px; }
.palette-item:hover { border-color: #888; }
.palette-item.selected { border-color: #e94560; box-shadow: 0 0 6px #e94560; }
.palette-item.editing { border-color: #27ae60; box-shadow: 0 0 6px #27ae60; }
.swatch { width: 28px; height: 28px; border-radius: 4px; flex-shrink: 0; }
.item-body { flex: 1; min-width: 0; }
.item-name { font-weight: bold; }
.item-sub { font-size: 10px; color: #778; }
.item-actions { display: flex; gap: 4px; }
.modes { display: flex; gap: 4px; margin-bottom: 12px; }
.mode-btn { flex: 1; padding: 8px 4px; border: 2px solid #444; border-radius: 6px; text-align: center; cursor: pointer; font-size: 11px; font-weight: bold; }
.mode-btn.active { border-color: #e94560; background: #2a1525; }
.grid-5x5 { display: grid; grid-template-columns: repeat(5, 72px); gap: 3px; margin: 10px 0; }
.grid-cell { width: 72px; height: 72px; border-radius: 6px; border: 2px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; text-align: center; cursor: pointer; transition: all 0.12s; color: rgba(255,255,255,0.9); text-shadow: 0 1px 2px rgba(0,0,0,0.9); position: relative; padding: 2px; word-break: break-word; }
.grid-cell:hover { border-color: #ffd700; transform: scale(1.04); }
.grid-cell.empty { background: #222; border-style: dashed; color: #555; }
.grid-cell .drill-badge { position: absolute; bottom: 2px; right: 3px; font-size: 9px; color: #fff; background: rgba(0,0,0,0.6); border-radius: 3px; padding: 0 3px; }
.add-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid #333; }
.edit-section { margin-top: 10px; padding: 10px; background: #0d1b2a; border: 1px solid #27ae60; border-radius: 8px; }
.edit-section h3 { color: #27ae60; }
label { display: block; font-size: 11px; color: #889; margin-top: 5px; }
input, select { width: 100%; padding: 4px 8px; border-radius: 4px; border: 1px solid #444; background: #1a1a2e; color: #eee; font-size: 12px; margin-top: 2px; }
input[type="color"] { height: 28px; padding: 2px; cursor: pointer; }
.btn { padding: 7px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; }
.btn-green { background: #27ae60; color: white; width: 100%; margin-top: 8px; }
.btn-red { background: #c0392b; color: white; font-size: 11px; padding: 4px 8px; }
.btn-blue { background: #2980b9; color: white; width: 100%; margin-top: 8px; }
.btn-gen { background: #e94560; color: white; width: 100%; margin-top: 10px; font-size: 15px; padding: 10px; }
.btn-small { background: #444; color: white; font-size: 10px; padding: 3px 6px; }
.btn-small:hover { background: #666; }
#output { background: #0d1117; border: 1px solid #333; border-radius: 8px; padding: 10px; white-space: pre-wrap; font-family: 'Consolas', monospace; font-size: 11px; color: #7ee787; max-height: 400px; overflow-y: auto; margin-top: 8px; }
.copy-btn { background: #3498db; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; margin-top: 4px; }
.stats-box { background: #0f3460; border-radius: 6px; padding: 8px; margin-top: 10px; font-size: 11px; }
.stats-box div { margin: 2px 0; }
.oil-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
.oil-dot.HeavyCrude { background: #888; }
.oil-dot.LightSweet { background: #3498db; }
.oil-dot.PremiumRefined { background: #f1c40f; }
.no-edit-msg { text-align: center; color: #556; margin-top: 40px; font-size: 14px; }
</style>
</head>
<body>
<div class="panel" id="left-panel">
    <h2>🗺️ Biomes</h2>
    <div id="biome-list"></div>
    <button class="btn btn-blue" onclick="createNewBiome()">+ New Biome</button>
    <h2 style="margin-top:20px">🎨 Tile Types</h2>
    <div id="tile-list"></div>
    <div id="edit-tile-panel"></div>
    <div class="add-section">
        <h3>+ Add New Tile</h3>
        <label>Name</label><input id="new-tile-name" placeholder="e.g. Lava Pool">
        <label>Color</label><input type="color" id="new-tile-color" value="#aa8855">
        <label>Material</label><select id="new-tile-mat"></select>
        <label>Drill Seconds</label><input id="new-tile-drill" type="number" value="6" min="0.5" step="0.5">
        <button class="btn btn-green" onclick="addTile()">+ Add Tile (single Heavy by default)</button>
        <p style="font-size:10px;color:#667;margin-top:4px">Once created, click ✎ to add multiple oil types + set their weights.</p>
    </div>
</div>
<div class="panel" id="center-panel"><div id="editor-area"><div class="no-edit-msg">← Select a biome to edit</div></div></div>
<div class="panel" id="right-panel">
    <h2>📋 Output</h2>
    <button class="btn btn-gen" onclick="generateAll()">Generate Luau Config</button>
    <button class="copy-btn" onclick="copyOutput()">Copy to Clipboard</button>
    <div id="output"></div>
</div>
<script>
const USED_MATERIALS = ["Sand","Sandstone","Ground","Pebble","Basalt","Mud","Ice","Grass","LeafyGrass","Glacier","Rock"];

// Each tile can have multiple potential oil types (oilTypes). When a chunk is generated,
// the runtime samples ONE oil type for that specific tile instance based on these weights.
let tiles = [
    {id:1, name:"Sand",       oilTypes:[{oil:"HeavyCrude",     weight:100}], color:"#fee0b4", mat:"Sand", drillSeconds:30},
    {id:2, name:"Sandstone",  oilTypes:[{oil:"LightSweet",     weight:100}], color:"#d9a454", mat:"Sand", drillSeconds:3500},
    {id:3, name:"SUPER TILE", oilTypes:[{oil:"PremiumRefined", weight:100}], color:"#ffdd00", mat:"Sand", drillSeconds:3500},
];
let nextTileId = 4;

function fillFromWeights(tileWeights) {
    let cells = Array.from({length:25}, () => ({t:null}));
    let totalW = tileWeights.reduce((s,tw) => s + tw.weight, 0);
    let tileSlots = [];
    tileWeights.forEach(tw => {
        let count = Math.round(tw.weight / totalW * 25);
        for (let i=0; i<count; i++) tileSlots.push(tw.tileId);
    });
    while (tileSlots.length < 25) tileSlots.push(tileWeights[0].tileId);
    while (tileSlots.length > 25) tileSlots.pop();
    for (let i=tileSlots.length-1; i>0; i--) {
        let j = Math.floor(Math.random() * (i+1));
        [tileSlots[i], tileSlots[j]] = [tileSlots[j], tileSlots[i]];
    }
    for (let i=0; i<25; i++) cells[i].t = tileSlots[i];
    return cells;
}

let biomes = [
    {name:"DustyDesert",     emoji:"🌍", cells:fillFromWeights([{tileId:1, weight:100}])},
    {name:"Ancient Desert",  emoji:"🌍", cells:fillFromWeights([{tileId:1, weight:68}, {tileId:2, weight:28}, {tileId:3, weight:4}])},
    {name:"Egyptian Desert", emoji:"🌍", cells:fillFromWeights([{tileId:1, weight:64}, {tileId:2, weight:32}, {tileId:3, weight:4}])},
];

let activeBiome = -1;
let selectedTile = null;
let editingTile = null;   // id of the tile being live-edited
let mode = 'tile';

function renderBiomeList() {
    const el = document.getElementById('biome-list');
    el.innerHTML = '';
    biomes.forEach((b, i) => {
        const filled = b.cells.filter(c => c.t).length;
        let strip = '';
        b.cells.slice(0, 10).forEach(c => {
            const t = c.t ? tiles.find(x => x.id === c.t) : null;
            strip += `<div style="background:${t ? t.color : '#222'}"></div>`;
        });
        const card = document.createElement('div');
        card.className = `biome-card ${i === activeBiome ? 'active' : ''}`;
        card.innerHTML = `<span class="emoji">${b.emoji}</span><div class="info"><div class="name">${b.name}</div><div class="stats">${filled}/25 tiles</div></div><div class="preview-strip">${strip}</div>`;
        card.onclick = () => { activeBiome = i; renderAll(); };
        el.appendChild(card);
    });
}

function oilTypesLabel(oilTypes) {
    if (!oilTypes || oilTypes.length === 0) return '<span style="color:#c88">no oil</span>';
    return oilTypes.map(o => `<span class="oil-dot ${o.oil}"></span>${o.oil}(${o.weight})`).join(' ');
}

function renderTileList() {
    const el = document.getElementById('tile-list');
    el.innerHTML = '';
    tiles.forEach(t => {
        const d = document.createElement('div');
        const cls = (t.id === editingTile) ? 'editing' : (t.id === selectedTile ? 'selected' : '');
        d.className = `palette-item ${cls}`;
        d.onclick = (e) => {
            if (e.target.classList.contains('btn-small') || e.target.classList.contains('btn-red')) return;
            selectedTile = t.id;
            mode = 'tile';
            renderAll();
        };
        d.innerHTML =
            `<div class="swatch" style="background:${t.color}"></div>
             <div class="item-body">
                <div class="item-name">${t.name}</div>
                <div class="item-sub">${oilTypesLabel(t.oilTypes)} · ${t.mat} · ⛏ ${t.drillSeconds}s</div>
             </div>
             <div class="item-actions">
                <button class="btn-small" onclick="event.stopPropagation();openEditTile(${t.id})">✎</button>
                <button class="btn-red"   onclick="event.stopPropagation();deleteTile(${t.id})">✕</button>
             </div>`;
        el.appendChild(d);
    });
}

function openEditTile(id) {
    editingTile = id;
    renderAll();
}

function closeEditTile() {
    editingTile = null;
    renderAll();
}

function renderEditTilePanel() {
    const el = document.getElementById('edit-tile-panel');
    if (!editingTile) { el.innerHTML = ''; return; }
    const t = tiles.find(x => x.id === editingTile);
    if (!t) { editingTile = null; el.innerHTML = ''; return; }
    if (!t.oilTypes) t.oilTypes = [{oil:'HeavyCrude', weight:100}];

    const matOpts = USED_MATERIALS.map(m =>
        `<option value="${m}"${m === t.mat ? ' selected' : ''}>${m}</option>`).join('');

    const oilRows = t.oilTypes.map((ot, idx) => {
        const optHtml = ['HeavyCrude', 'LightSweet', 'PremiumRefined'].map(o =>
            `<option value="${o}"${o === ot.oil ? ' selected' : ''}>${o}</option>`).join('');
        return `<div style="display:flex;gap:4px;align-items:center;margin-top:4px">
            <span class="oil-dot ${ot.oil}"></span>
            <select style="flex:1" onchange="updateOilRow(${t.id}, ${idx}, 'oil', this.value)">${optHtml}</select>
            <input style="width:60px" type="number" min="1" value="${ot.weight}" oninput="updateOilRow(${t.id}, ${idx}, 'weight', parseInt(this.value) || 1)">
            <button class="btn-red" onclick="removeOilRow(${t.id}, ${idx})">✕</button>
        </div>`;
    }).join('');

    el.innerHTML = `
        <div class="edit-section">
            <h3>✎ Editing: ${t.name}</h3>
            <label>Name</label><input id="edit-name" value="${t.name}" oninput="updateTileField(${t.id}, 'name', this.value)">
            <label>Color</label><input type="color" id="edit-color" value="${t.color}" oninput="updateTileField(${t.id}, 'color', this.value)">
            <label>Material</label><select id="edit-mat" onchange="updateTileField(${t.id}, 'mat', this.value)">${matOpts}</select>
            <label>Drill Seconds</label><input id="edit-drill" type="number" value="${t.drillSeconds}" min="0.5" step="0.5" oninput="updateTileField(${t.id}, 'drillSeconds', parseFloat(this.value) || 0)">
            <label style="margin-top:10px">Possible Oil Types (weighted pick per tile instance)</label>
            ${oilRows}
            <button class="btn-small" style="margin-top:6px" onclick="addOilRow(${t.id})">+ Add Oil Type</button>
            <button class="btn btn-blue" onclick="closeEditTile()">Done</button>
        </div>`;
}

function updateTileField(id, field, value) {
    const t = tiles.find(x => x.id === id);
    if (!t) return;
    t[field] = value;
    renderTileList();
    renderBiomeList();
    renderEditor();
}

function updateOilRow(tileId, idx, field, value) {
    const t = tiles.find(x => x.id === tileId);
    if (!t || !t.oilTypes || !t.oilTypes[idx]) return;
    t.oilTypes[idx][field] = value;
    renderTileList();
}

function addOilRow(tileId) {
    const t = tiles.find(x => x.id === tileId);
    if (!t) return;
    if (!t.oilTypes) t.oilTypes = [];
    // Default to an oil type not already present, else fall back to HeavyCrude
    const used = new Set(t.oilTypes.map(o => o.oil));
    const next = ['HeavyCrude', 'LightSweet', 'PremiumRefined'].find(o => !used.has(o)) || 'HeavyCrude';
    t.oilTypes.push({oil: next, weight: 50});
    renderAll();
}

function removeOilRow(tileId, idx) {
    const t = tiles.find(x => x.id === tileId);
    if (!t || !t.oilTypes) return;
    if (t.oilTypes.length <= 1) { alert("Tile must have at least one oil type."); return; }
    t.oilTypes.splice(idx, 1);
    renderAll();
}

function renderEditor() {
    const el = document.getElementById('editor-area');
    if (activeBiome < 0 || !biomes[activeBiome]) {
        el.innerHTML = '<div class="no-edit-msg">← Select a biome to edit</div>';
        return;
    }
    const b = biomes[activeBiome];
    let h = `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <span style="font-size:28px">${b.emoji}</span>
        <input value="${b.name}" style="background:#1a1a2e;border:1px solid #444;color:#ffd700;font-size:18px;font-weight:bold;padding:4px 10px;border-radius:6px;width:220px" onchange="biomes[${activeBiome}].name=this.value;renderBiomeList()">
        <input value="${b.emoji}" style="width:50px;background:#1a1a2e;border:1px solid #444;color:#eee;font-size:18px;text-align:center;border-radius:6px" maxlength="4" onchange="biomes[${activeBiome}].emoji=this.value;renderBiomeList()">
        <button class="btn-red" onclick="deleteBiome(${activeBiome})">Delete</button>
    </div>
    <div class="modes">
        <div class="mode-btn ${mode==='tile'?'active':''}" onclick="mode='tile';renderAll()">🟩 Tile</div>
        <div class="mode-btn ${mode==='erase'?'active':''}" onclick="mode='erase';renderAll()">🗑️ Erase</div>
    </div>
    <div class="grid-5x5">`;
    for (let i = 0; i < 25; i++) {
        const c = b.cells[i];
        const tile = c.t ? tiles.find(x => x.id === c.t) : null;
        const bg = tile ? tile.color : '#222';
        const cls = tile ? 'grid-cell' : 'grid-cell empty';
        const tn = tile ? tile.name : '';
        const drillBadge = tile ? `<div class="drill-badge">${tile.drillSeconds}s</div>` : '';
        h += `<div class="${cls}" style="background:${bg}" onclick="cellClick(${i})" oncontextmenu="event.preventDefault();cellClear(${i})">${tn}${drillBadge}</div>`;
    }
    h += '</div><p style="font-size:10px;color:#556;margin-top:4px">Left-click = place. Right-click = clear.</p>';

    // Stats
    const oc = {}; let filled = 0;
    b.cells.forEach(c => {
        if (c.t) {
            filled++;
            const t = tiles.find(x => x.id === c.t);
            if (t) oc[t.oil] = (oc[t.oil] || 0) + 1;
        }
    });
    h += '<div class="stats-box">';
    h += `<div><b>${filled}/25</b> tiles filled</div>`;
    for (const [oil, count] of Object.entries(oc)) {
        h += `<div><span class="oil-dot ${oil}"></span>${oil}: ${count} (${Math.round(count/Math.max(filled,1)*100)}%)</div>`;
    }
    h += '</div>';
    el.innerHTML = h;
}

function renderAll() {
    renderBiomeList();
    renderTileList();
    renderEditTilePanel();
    renderEditor();
}

function cellClick(i) {
    if (activeBiome < 0) return;
    const b = biomes[activeBiome];
    if (mode === 'tile' && selectedTile) b.cells[i].t = selectedTile;
    else if (mode === 'erase') b.cells[i].t = null;
    renderEditor();
    renderBiomeList();
}

function cellClear(i) {
    if (activeBiome < 0) return;
    biomes[activeBiome].cells[i].t = null;
    renderEditor();
    renderBiomeList();
}

function addTile() {
    const n = document.getElementById('new-tile-name').value.trim();
    if (!n) return alert('Name?');
    tiles.push({
        id: nextTileId++,
        name: n,
        oilTypes: [{oil:'HeavyCrude', weight:100}], // edit with ✎ to add more/change
        color: document.getElementById('new-tile-color').value,
        mat: document.getElementById('new-tile-mat').value,
        drillSeconds: parseFloat(document.getElementById('new-tile-drill').value) || 6,
    });
    document.getElementById('new-tile-name').value = '';
    renderAll();
}

function deleteTile(id) {
    const t = tiles.find(x => x.id === id);
    if (!t) return;
    if (!confirm(`Delete tile "${t.name}"? It'll be cleared from all biomes.`)) return;
    tiles = tiles.filter(x => x.id !== id);
    if (selectedTile === id) selectedTile = null;
    if (editingTile === id) editingTile = null;
    biomes.forEach(b => b.cells.forEach(c => { if (c.t === id) c.t = null; }));
    renderAll();
}

function createNewBiome() {
    const n = prompt('Biome name:', 'New Biome');
    if (!n) return;
    const e = prompt('Emoji:', '🌍') || '🌍';
    biomes.push({name:n, emoji:e, cells:Array.from({length:25}, () => ({t:null}))});
    activeBiome = biomes.length - 1;
    renderAll();
}

function deleteBiome(i) {
    if (!confirm('Delete ' + biomes[i].name + '?')) return;
    biomes.splice(i, 1);
    if (activeBiome >= biomes.length) activeBiome = biomes.length - 1;
    renderAll();
}

function hexToRgb(h) {
    return {
        r: parseInt(h.slice(1,3), 16),
        g: parseInt(h.slice(3,5), 16),
        b: parseInt(h.slice(5,7), 16),
    };
}

function generateAll() {
    let lua = '-- Generated by Oil Empire Tile Designer\n\n';
    lua += 'local BiomeConfig = {}\n\n';
    lua += 'BiomeConfig.Biomes = {\n';
    biomes.forEach(b => {
        const key = b.name.replace(/\s+/g, '');
        lua += `\t${key} = {\n`;
        lua += `\t\tdisplayName = "${b.name}",\n`;
        lua += `\t\temoji = "${b.emoji}",\n`;
        lua += `\t\ttileTypes = {\n`;
        const tc = {};
        let tot = 0;
        b.cells.forEach(c => { if (c.t) { tc[c.t] = (tc[c.t] || 0) + 1; tot++; } });
        for (const [id, cnt] of Object.entries(tc)) {
            const t = tiles.find(x => x.id === parseInt(id));
            if (!t) continue;
            const w = Math.round(cnt / Math.max(tot, 1) * 100);
            const {r, g, b: bl} = hexToRgb(t.color);
            // Emit oilTypes = {{oilType=X, weight=N}, ...}. Runtime samples one at chunk reveal.
            const oilList = (t.oilTypes || [{oil:'HeavyCrude', weight:100}])
                .map(o => `{ oilType = "${o.oil}", weight = ${o.weight} }`).join(', ');
            lua += `\t\t\t{ name = "${t.name}", oilTypes = { ${oilList} }, weight = ${w}, drillSeconds = ${t.drillSeconds}, material = Enum.Material.${t.mat}, color = Color3.fromRGB(${r}, ${g}, ${bl}) },\n`;
        }
        lua += '\t\t},\n';
        lua += '\t},\n';
    });
    lua += '}\n\nreturn BiomeConfig\n';
    document.getElementById('output').textContent = lua;
}

function copyOutput() {
    navigator.clipboard.writeText(document.getElementById('output').textContent).then(() => alert('Copied!'));
}

const matSelect = document.getElementById('new-tile-mat');
USED_MATERIALS.forEach(m => {
    const o = document.createElement('option');
    o.value = m; o.textContent = m;
    matSelect.appendChild(o);
});

renderAll();
</script>
</body>
</html>
